<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nike Flip Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/nike.css"/>
</head>
<body>

  <div class="scene">
    <img class="shoe-img" src="imgs/Image.png" alt="Nike Shoe"/>

    <div class="card">
      <div class="face front">
        <div class="info">
          <p class="label">Shoes</p>
          <h1 class="shoe-name">Nike ZOOM Vaporfly NEXT Premium</h1>
          <p class="price">$ 254.99</p>
        </div>
      </div>
      <div class="face back">
        <div class="info">
          <p class="label">Shoes</p>
          <h1 class="shoe-name">Nike ZOOM Vaporfly NEXT Premium</h1>
          <p class="price">$ 254.99</p>
        </div>
        <div class="controls">
          <p class="size-label">Select Size</p>
          <div class="sizes">
            <input type="radio" name="size" id="s5"/>
            <label class="size-btn" for="s5">5</label>
            <input type="radio" name="size" id="s6"/>
            <label class="size-btn" for="s6">6</label>
            <input type="radio" name="size" id="s7" checked/>
            <label class="size-btn" for="s7">7</label>
            <input type="radio" name="size" id="s8"/>
            <label class="size-btn" for="s8">8</label>
            <input type="radio" name="size" id="s9"/>
            <label class="size-btn" for="s9">9</label>
          </div>
          <div class="actions">
            <label class="btn-heart">
              <input type="checkbox"/>
              <i class="fa-regular fa-heart"></i>
            </label>
            <label class="btn-cart">
              <i class="fa-solid fa-basket-shopping"></i>
              ADD TO CART
            </label>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>

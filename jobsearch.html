<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Search - Sign Up</title>
    <link rel="stylesheet" href="./css/jobsearch.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>JobSearch.com</h1>
    </div>

    <h2>Create Your Account</h2>

    <!-- Basic Info -->
    <div class="section">
        <h3>Basic Information</h3>

        <label>Email</label>
        <input type="email">

        <label>Password</label>
        <input type="password">

        <label> Confirm Password</label>
        <input type="password">

        <label>First Name</label>
        <input type="text">

        <label>Last Name</label>
        <input type="text">

        <label>Phone Number</label>
        <input type="text" placeholder="+20_ _ _ _ _ _ _ _ _ _">

        <label>Address</label>
        <input type="text">

        <label>City</label>
        <input type="text">

        <label>Province</label>
        <select>
            <option>-select-</option>
            <option>5th Settelement</option>
            <option>6 October</option>
            <option>Dokki</option>
            <option>Shourouk</option>
            <option>Sheikh Zayed</option>
        </select>

        <label>Country</label>
        <input type="text">
    </div>

    <!-- Education -->
    <div class="section">
        <h3>Education</h3>

        <label>School</label>
        <input type="text">

        <label>Program</label>
        <input type="text">

        <label>Education Level</label>
        <select>
            <option>-select-</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
        </select>

        <label id="state"> Educational Status</label>
        <div  class="status">
            <div class="option">
            <span>Graduated</span>
            <input type="radio" name="status">

            </div>
            <div class="option">
            <span>Under Graduated</span>
            <input type="radio" name="status">
        </div>
        </div>

        <label>Graduation Date</label>
        <input type="date">
    </div>

    <!-- Work -->
    <div class="section">
        <h3>Work Experience</h3>

        <label>Employer</label>
        <input type="text">

        <label>Job Title</label>
        <input type="text">

        <label>Job Duty</label>
        <textarea></textarea>

        <label>Worked Year</label>
        <input type="number">
    </div>

    <!-- Attachments -->
    <div class="section">
        <h3>Attachments</h3>
        <input type="file">
    </div>

    <!-- Buttons -->
    <div class="buttons">
        <button class="reset">Reset</button>
        <button class="apply">Apply</button>
    </div>

</div>

</body>
</html>
